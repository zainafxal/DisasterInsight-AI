name: ml_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10  # or your specific Python version
  - pip
  - pandas=2.2.3
  - numpy=1.26.4
  - scikit-learn=1.3.2
  - xgboost=3.0.2
  - joblib=1.5.0
  - matplotlib=3.10.0
  - seaborn=0.13.2

  # Computer_vision model dependencies
  # tensorflow and Pillow is required for CV Model (05 Model) only - I have trained CV model (Notebooke 05) seprately on Google Collab
  # So if you want conflicts free environment for other notebooks, you can remove these two libraries
  - tensorflow=2.19.0        # Required for Keras/MobileNetV2
  - pillow=10.1.0            # Required by ImageDataGenerator
  - pip:
      - torch==2.5.1
      - transformers==4.36.2
      - datasets==3.6.0
      - tqdm==4.67.1
      - prophet==1.1.7
      - opencv-python==4.8.1.78  # Optional, advanced CV
